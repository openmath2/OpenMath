pre-commit:
  parallel: true
  commands:
    typecheck-node:
      glob: "packages/agent/**/*.{ts,tsx}"
      run: pnpm -F @openmath/agent typecheck
    lint-python:
      glob: "packages/math-engine/**/*.py"
      root: "packages/math-engine"
      run: uv run ruff check {staged_files}

pre-push:
  commands:
    block-direct-main-push:
      run: |
        protected_branch="main"
        current_branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "$current_branch" = "$protected_branch" ]; then
          echo ""
          echo "  Direct push to '$protected_branch' is blocked."
          echo "  Create a feature branch and open a pull request:"
          echo ""
          echo "    git checkout -b feat/your-change"
          echo "    git push -u origin feat/your-change"
          echo ""
          exit 1
        fi
    test-node:
      run: pnpm -F @openmath/agent test
    test-python:
      root: "packages/math-engine"
      run: uv run pytest -q

commit-msg:
  commands:
    enforce-subject-length:
      run: |
        msg="$(head -n1 {1})"
        if [ -z "$msg" ]; then
          echo "Empty commit message"
          exit 1
        fi
        if [ ${#msg} -gt 72 ]; then
          echo "First line of commit message must be <= 72 chars (got ${#msg})"
          exit 1
        fi
