name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-tests:
    name: Node.js Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  python-tests:
    name: Python Math Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/math-engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -v

  integration-tests:
    name: Node ↔ Python Integration
    runs-on: ubuntu-latest
    needs: [node-tests, python-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync --all-extras
        working-directory: packages/math-engine

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm -F @openmath/agent test:integration
